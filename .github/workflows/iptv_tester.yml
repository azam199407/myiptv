name: IPTV Async Auto Tester Engine

on:
  schedule:
    - cron: '*/30 * * * *'  # প্রতি ৩০ মিনিট পর পর অটো রান হবে
  workflow_dispatch:        # ম্যানুয়ালি রান করার বাটন

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run IPTV Scraper
      run: python scraper.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html live.m3u
        # কোনো পরিবর্তন না থাকলে যেন এরর না দেয়
        git commit -m "🔄 Live Channel Force Synced" || echo "No changes to commit"
        # যেকোনো ব্রাঞ্চেই হোক না কেন অটোমেটিক পুশ করার কমান্ড
        git push origin HEAD
      env:
        GITHUB_TOKEN: ${{ secrets.IPTV_TOKEN }}
