name: IPTV Scraper and Tester

on:
  schedule:
    - cron: '0 * * * *' # প্রতি ঘণ্টায় অটোমেটিক রান করবে
  workflow_dispatch: # আপনি ম্যানুয়ালি রান করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install aiohttp pandas

      - name: Run Scraper
        env:
          SHEET_URL: ${{ secrets.SHEET_URL }}
        run: |
          python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add live.m3u
          git commit -m "Auto-update IPTV channels" || exit 0
          git push
