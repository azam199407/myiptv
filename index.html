<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYIPTV IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0b0c10; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; background: #1f2833; text-align: center; padding: 15px 0; border-bottom: 2px solid #ff0000; }
        .header h1 { margin: 0; color: #ff0000; font-size: 26px; text-transform: uppercase; letter-spacing: 2px; }
        .player-container { width: 95%; max-width: 850px; margin: 20px 0 20px 0; background: #000; border: 3px solid #1f2833; border-radius: 8px; overflow: hidden; box-shadow: 0 0 15px rgba(255,0,0,0.2); }
        video { width: 100%; height: auto; aspect-ratio: 16/9; display: block; }
        
        .search-box { width: 95%; max-width: 850px; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 14px 20px; background: #151b24; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 16px; box-sizing: border-box; outline: none; }
        .search-box input:focus { border-color: #ff0000; }

        .grid-container { width: 95%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding-bottom: 40px; }
        .channel-btn { background: #ffffff; color: #000; border: 2px solid #e1e4e8; padding: 15px 10px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; height: 120px; outline: none; }
        .channel-btn img { width: auto; height: 50px; max-width: 90%; object-fit: contain; }
        .channel-btn span { font-size: 13px; font-weight: bold; text-align: center; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; width: 100%; color: #111; }
        .channel-btn:hover { transform: translateY(-3px); border-color: #ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.3); }
        .channel-btn.active { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.5); background: #fff5f5; }
        @media(max-width: 600px){ .grid-container { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; } .channel-btn { height: 100px; } .channel-btn img { height: 40px; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>MYIPTV LIVE TV</h1>
    </div>

    <div class="player-container">
        <video id="video-player" controls autoplay poster="https://placehold.co/800x450/000000/ff0000?text=Select+a+Channel"></video>
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Search BD or India Channel..." onkeyup="filterChannels()">
    </div>

    <div class="grid-container" id="buttons-grid"></div>

    <script>
        const channels = [{"name":"NTV","logo":"https://admango.cdn.mangomolo.com/analytics/uploads/188/6544bebaae.jpg","url":"https://cdn.freevisiontv.co.za/sttv/smil:1kzn.stream.smil/playlist.m3u8"},{"name":"BTV","logo":"https://i.imgur.com/jrGrfof.png","url":"http://158.69.124.9:1935/5aabtv/5aabtv/playlist.m3u8"},{"name":"RTV","logo":"https://upload.wikimedia.org/wikipedia/commons/2/27/WWAY_logo.png","url":"https://aegis-cloudfront-1.tubi.video/bc9ff1c7-4dc1-4e36-9ef0-25b28c595ada/playlist.m3u8"},{"name":"GTV","logo":"https://upload.wikimedia.org/wikipedia/commons/2/27/WWAY_logo.png","url":"https://aegis-cloudfront-1.tubi.video/1a352414-3a30-4f42-b14b-c091d02a5e45/playlist.m3u8"},{"name":"ATN Bangla","logo":"https://i.imgur.com/vFpjggf.png","url":"https://app.ncare.live/c3VydmVyX8RpbEU9Mi8xNy8yMDE0GIDU6RgzQ6NTAgdEoaeFzbF92YWxIZTO0U0ezN1IzMyfvcGVMZEJCTEFWeVN3PTOmdFsaWRtaW51aiPhnPTI2/atnbanglauk-off.stream/playlist.m3u8"},{"name":"ATN News","logo":"https://i.imgur.com/4qZQKjo.png","url":"https://bozztv.com/rongo/rongo-ATNNews/index.m3u8"},{"name":"Channel i","logo":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/BBC_One_logo_2021.svg/960px-BBC_One_logo_2021.svg.png","url":"https://vs-cmaf-pushb-uk-live.akamaized.net/x=4/i=urn:bbc:pips:service:bbc_one_channel_islands/hevc_iptv_mse_v0.mpd"},{"name":"News 24","logo":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/CBS_News_247_logo.svg/960px-CBS_News_247_logo.svg.png","url":"https://cbsn-us-vtt.cbsnstream.cbsnews.com/out/v1/ef868690d34144509eda696884bf1619/master.m3u8"},{"name":"Channel 24","logo":"https://i.imgur.com/4JLkaF7.png","url":"https://bozztv.com/rongo/rongo-Channel24HD/index.m3u8"},{"name":"Colors Bangla","logo":"https://xstreamcp-assets-msp.streamready.in/assets/LIVETV/LIVECHANNEL/LIVETV_LIVETVCHANNEL_COLORS_BANGLA/images/LOGO_HD/image.png","url":"http://103.72.101.252:8080/live/1369.m3u8"},{"name":"Dangal TV","logo":"https://i.imgur.com/BEr1r7L.png","url":"https://live-dangal2.akamaiz ur.com/nnqpYNm.png","url":"http://121.91.61.106:8000/play/a04h/index.m3u8"},{"name":"Zee Cinema","logo":"https://xstreamcp-assets-msp.streamready.in/assets/LIVETV/LIVECHANNEL/LIVETV_LIVETVCHANNEL_ZEE_CINEMA/images/LOGO_HD/LOGO_HD_image.png","url":"https://amg17931-zee-amg17931c5-samsung-au-8873.playouts.now.amagi.tv/playlist.m3u8"},{"name":"Zee TV","logo":"https://i.imgur.com/mARKUZ9.png","url":"https://origin-cae-m462953.toober.com/4c3caf7294b3/c8bf99484885/playlist.m3u8"}];
        const player = document.getElementById('video-player');
        const hls = new Hls();

        function playStream(url, btnElement) {
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            if (Hls.isSupported()) {
                hls.loadSource(url);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = url;
                player.addEventListener('loadedmetadata', () => player.play());
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function initGrid(data) {
            const grid = document.getElementById('buttons-grid');
            grid.innerHTML = '';
            data.forEach((ch, index) => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                
                const img = document.createElement('img');
                img.src = ch.logo;
                img.onerror = function() { this.src = "https://placehold.co/120x70/1f2833/ff0000?text=" + encodeURIComponent(ch.name); };
                
                const span = document.createElement('span');
                span.innerText = ch.name;
                
                btn.appendChild(img);
                btn.appendChild(span);
                btn.onclick = function() { playStream(ch.url, btn); };
                grid.appendChild(btn);
                
                if(index === 0 && data.length === channels.length) {
                    playStream(ch.url, btn);
                }
            });
        }

        function filterChannels() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = channels.filter(ch => ch.name.toLowerCase().includes(query));
            initGrid(filtered);
        }

        initGrid(channels);
    </script>
</body>
</html>
