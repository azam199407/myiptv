<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>My IPTV Player</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #0f0f0f; color: white; font-family: sans-serif; }
        #player-container { height: 350px; background: black; width: 100%; display: flex; align-items: center; justify-content: center; }
        #video-player { width: 100%; height: 100%; }
        #list-container { flex: 1; overflow-y: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .card { background: #1a1a1a; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .card:hover { background: #333; }
        .card img { width: 50px; height: 50px; display: block; margin: 0 auto 8px; object-fit: contain; }
        .channel-name { font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="video-player" controls autoplay></video>
    </div>

    <div id="list-container">
        <input type="text" id="search" placeholder="চ্যানেল সার্চ করুন..." style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px; background: #222; border: none; color: white;">
        <div id="grid" class="grid">লোড হচ্ছে...</div>
    </div>

    <script>
        // এখানে আপনার ইউজারনেম বসাবেন
        const M3U_URL = 'https://raw.githubusercontent.com/azam199407/myiptv/main/live.m3u';
        const DEFAULT_LOGO = 'https://img.icons8.com/fluency/48/tv.png';
        
        fetch(M3U_URL)
        .then(r => r.text())
        .then(data => {
            const grid = document.getElementById('grid');
            grid.innerHTML = ''; 
            const lines = data.split('\n');
            
            for(let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if(line.startsWith('#EXTINF')) {
                    // নাম থেকে রেজোলিউশন মুছে ফেলা
                    let namePart = line.split(',');
                    let name = namePart.length > 1 ? namePart[1] : "Unnamed Channel";
                    name = name.replace(/\(\d+p\)/gi, '').replace(/\[.*?\]/g, '').trim();
                    
                    // লোগো লিংক পার্স করা (আপনার স্ক্রিনশটের ফরম্যাট অনুযায়ী)
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/i);
                    let logo = logoMatch ? logoMatch[1] : DEFAULT_LOGO;
                    
                    const url = lines[i+1] ? lines[i+1].trim() : "";
                    
                    if(url.startsWith('http')) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        
                        // onerror ব্যবহার করা হয়েছে যাতে লিংক নষ্ট থাকলে ডিফল্ট লোগো দেখায়
                        card.innerHTML = `<img src="${logo}" onerror="this.onerror=null; this.src='${DEFAULT_LOGO}';" alt="logo"> <div class="channel-name">${name}</div>`;
                        
                        card.onclick = () => { document.getElementById('video-player').src = url; };
                        grid.appendChild(card);
                    }
                }
            }
        }).catch(err => {
            document.getElementById('grid').innerHTML = "ডেটা লোড করতে সমস্যা হচ্ছে।";
            console.error(err);
        });

        document.getElementById('search').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const name = card.querySelector('.channel-name').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
