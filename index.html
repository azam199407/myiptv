<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE TV PORTAL</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #08090c; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; background: #121620; text-align: center; padding: 15px 0; border-bottom: 2px solid #00ff55; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .header h1 { margin: 0; color: #00ff55; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .player-container { width: 95%; max-width: 850px; margin: 15px 0; background: #000; border: 1px solid #1f2637; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        video { width: 100%; height: auto; aspect-ratio: 16/9; display: block; background: #000; }
        
        .controls-area { width: 95%; max-width: 850px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 14px 20px; background: #121620; border: 1px solid #232c3f; border-radius: 8px; color: #fff; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .search-box input:focus { border-color: #00ff55; box-shadow: 0 0 10px rgba(0,255,85,0.2); }
        
        .cat-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .cat-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: #121620; color: #a0a5b5; border: 1px solid #232c3f; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 13px; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { background: #00ff55; color: #000; border-color: #00ff55; box-shadow: 0 4px 12px rgba(0,255,85,0.3); }

        .grid-container { width: 95%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; padding-bottom: 5px; }
        .channel-btn { background: #121620; color: #fff; border: 1px solid #232c3f; padding: 12px 8px; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; height: 115px; box-sizing: border-box; transition: all 0.2s ease; }
        .channel-btn:hover { border-color: #00ff55; transform: translateY(-2px); background: #171d2a; }
        .channel-btn img { height: 48px; max-width: 85%; object-fit: contain; border-radius: 4px; }
        .channel-btn span { font-size: 11px; font-weight: 600; text-align: center; color: #e1e4ed; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; width: 100%; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .channel-btn.active { border: 2px solid #00ff55; background: #171d2a; box-shadow: inset 0 0 10px rgba(0,255,85,0.15); }
        
        @media(max-width: 600px){ .grid-container { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; } .channel-btn { height: 95px; padding: 8px 4px; } .channel-btn img { height: 38px; } .channel-btn span { font-size: 10px; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>📺 PREMIUM MULTI-CHANNEL IPTV PORTAL</h1>
    </div>

    <div class="player-container">
        <video id="video-player" controls autoplay playsinline></video>
    </div>

    <div class="controls-area">
        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 Search among 300+ channels..." onkeyup="filterChannels()">
        </div>
        <div class="cat-tabs" id="tabs-box">
            <button class="tab-btn active" onclick="switchCategory('All')">All Channels</button>
            <button class="tab-btn" onclick="switchCategory('Sports')">⚽ Sports</button>
            <button class="tab-btn" onclick="switchCategory('Bangladesh')">🇧🇩 Bangladesh</button>
            <button class="tab-btn" onclick="switchCategory('India')">🇮🇳 India</button>
            <button class="tab-btn" onclick="switchCategory('News')">📰 News</button>
            <button class="tab-btn" onclick="switchCategory('Entertainment')">🎬 Entertainment</button>
        </div>
    </div>

    <div class="grid-container" id="buttons-grid"></div>

    <script>
        const channels = [];
        const player = document.getElementById('video-player');
        let currentCategory = 'All';
        let hls = new Hls();

        function playStream(url, btnElement) {
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls({ maxBufferLength: 15, enableWorker: true });
                hls.loadSource(url);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play().catch(e => console.log("Autoplay handle")));
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = url;
                player.addEventListener('loadedmetadata', () => player.play());
            }
        }

        function initGrid(data) {
            const grid = document.getElementById('buttons-grid');
            grid.innerHTML = '';
            
            data.forEach((ch, index) => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                
                const img = document.createElement('img');
                img.src = ch.logo;
                img.onerror = function() { 
                    this.src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(ch.name) + "&background=232c3f&color=00ff55&size=150&bold=true"; 
                };
                
                const span = document.createElement('span');
                span.innerText = ch.name;
                
                btn.appendChild(img);
                btn.appendChild(span);
                btn.onclick = function() { playStream(ch.url, btn); };
                grid.appendChild(btn);
                
                if(index === 0 && data.length === channels.length) { playStream(ch.url, btn); }
            });
        }

        function switchCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            filterChannels();
        }

        function filterChannels() {
            const query = document.getElementById('search').value.toLowerCase();
            let filtered = channels;
            
            if (currentCategory !== 'All') {
                filtered = filtered.filter(ch => ch.category === currentCategory);
            }
            if (query) {
                filtered = filtered.filter(ch => ch.name.toLowerCase().includes(query));
            }
            initGrid(filtered);
        }

        initGrid(channels);
    </script>
</body>
</html>
