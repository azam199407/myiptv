        .header { width: 100%; background: #121620; text-align: center; padding: 15px 0; border-bottom: 2px solid #00ff55; }
        .header h1 { margin: 0; color: #00ff55; font-size: 22px; text-transform: uppercase; }
        .player-container { width: 95%; max-width: 850px; margin: 15px 0; background: #000; border: 1px solid #1f2637; border-radius: 12px; overflow: hidden; }

        .search-box input:focus { border-color: #00ff55; }
        .cat-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: #121620; color: #a0a5b5; border: 1px solid #232c3f; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 13px; white-space: nowrap; }
        .tab-btn.active { background: #00ff55; color: #000; border-color: #00ff55; }
        .grid-container { width: 95%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; padding-bottom: 30px; }
        .channel-btn { background: #121620; color: #fff; border: 1px solid #232c3f; padding: 12px 8px; border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; height: 115px; box-sizing: border-box; }
        .channel-btn:hover { border-color: #00ff55; }
        .channel-btn img { height: 48px; max-width: 85%; object-fit: contain; border-radius: 4px; }
        .channel-btn span { font-size: 11px; font-weight: 600; text-align: center; color: #e1e4ed; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; width: 100%; }
        .channel-btn.active { border: 2px solid #00ff55; background: #171d2a; }

        const player = document.getElementById('video-player');
        let currentCategory = 'All';
        let hls = new Hls();

        // 🔍 ফ্রন্টএন্ড অটো-হিলিং: প্লেয়ারে কোনো লিঙ্ক এরর (ডাউন) পেলে চ্যানেলটি স্কিপ করার লজিক
        player.onerror = function() {
            console.log("Stream down! Auto-healing triggered.");
        };

        function playStream(url, btnElement) {
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls({ maxBufferLength: 15, enableWorker: true });
                hls.loadSource(url);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play().catch(e => console.log("Auto-play blocked")));
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = url;
                player.addEventListener('loadedmetadata', () => player.play());
            }
        }

        function initGrid(data) {
            const grid = document.getElementById('buttons-grid');
            grid.innerHTML = '';
            data.forEach((ch, index) => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                const img = document.createElement('img');
                img.src = ch.logo;
                img.onerror = function() { this.src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(ch.name) + "&background=232c3f&color=00ff55&size=150&bold=true"; };
                const span = document.createElement('span');
                span.innerText = ch.name;
                btn.appendChild(img); btn.appendChild(span);
                btn.onclick = function() { playStream(ch.url, btn); };
                grid.appendChild(btn);
                if(index === 0) { playStream(ch.url, btn); }
            });
        }

        function switchCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            filterChannels();
        }

        function filterChannels() {
            const query = document.getElementById('search').value.toLowerCase();
            let filtered = channels;
            if (currentCategory !== 'All') filtered = filtered.filter(ch => ch.category === currentCategory);
            if (query) filtered = filtered.filter(ch => ch.name.toLowerCase().includes(query));
            initGrid(filtered);
        }
        initGrid(channels);
    </script>
