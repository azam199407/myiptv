<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>My IPTV Player</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #0f0f0f; color: white; font-family: sans-serif; }
        #player-container { height: 350px; background: black; width: 100%; display: flex; align-items: center; justify-content: center; }
        #video-player { width: 100%; height: 100%; }
        #list-container { flex: 1; overflow-y: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .card { background: #1a1a1a; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #333; }
        .card img { width: 40px; height: 40px; display: block; margin: 0 auto 5px; }
    </style>
</head>
<body>

    <div id="player-container">
        <video id="video-player" controls autoplay></video>
    </div>

    <div id="list-container">
        <input type="text" id="search" placeholder="চ্যানেল সার্চ করুন..." style="width:100%; padding:10px; margin-bottom:15px; border-radius:5px;">
        <div id="list" class="grid"></div>
    </div>

    <script>
        const M3U_URL = 'https://raw.githubusercontent.com/YOUR_USERNAME/myiptv/main/live.m3u';
        
        fetch(M3U_URL).then(r => r.text()).then(data => {
            const lines = data.split('\n');
            let html = '';
            for(let i = 0; i < lines.length; i++) {
                if(lines[i].startsWith('#EXTINF')) {
                    const name = lines[i].split(',')[1];
                    const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || 'https://i.imgur.com/Q5Z4y7T.png';
                    const url = lines[i+1];
                    html += `<div class="card" onclick="document.getElementById('video-player').src='${url}'">
                                <img src="${logo}"> ${name}
                             </div>`;
                }
            }
            document.getElementById('list').innerHTML = html;
        });
    </script>
</body>
</html>
