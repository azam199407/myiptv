<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV PLAYER</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0b0c10; color: #fff; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; background: #1f2833; text-align: center; padding: 15px 0; border-bottom: 2px solid #ff0000; }
        .header h1 { margin: 0; color: #ff0000; font-size: 24px; text-transform: uppercase; }
        .player-container { width: 95%; max-width: 800px; margin: 20px 0; background: #000; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: auto; aspect-ratio: 16/9; display: block; }
        .grid-container { width: 95%; max-width: 1200px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding-bottom: 40px; }
        .channel-btn { background: #ffffff; color: #000; border: none; padding: 10px; border-radius: 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; height: 110px; }
        .channel-btn img { height: 45px; max-width: 90%; object-fit: contain; }
        .channel-btn span { font-size: 12px; font-weight: bold; text-align: center; color: #111; }
        .channel-btn.active { border: 3px solid #00ff00; background: #fff; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MY LIVE IPTV PANEL</h1>
    </div>

    <div class="player-container">
        <video id="video-player" controls autoplay playsinline muted></video>
    </div>

    <div class="grid-container" id="buttons-grid"></div>

    <script>
        const channels = [{"name":"T Sports Live","logo":"https://i.ibb.co/6w4n0mG/tsports.png","url":"https://live-par02.thesports.club/tsports/index.m3u8"},{"name":"Sony Sports Ten 1","logo":"https://i.postimg.co/yxB70z8g/Sony-Sports-1.png","url":"https://pubads.g.doubleclick.net/ssai/event/X7b8S3S_R_m8YVp3_Wv27g/master.m3u8"},{"name":"Somoy TV","logo":"https://iptv-org.github.io/images/languages/ben/SomoyTV.png","url":"https://youtube.com/playlist?list=PL_Xv4N7V3XGvGZ8Fh9GvPz5N8XF1X3X7b/live.m3u8"},{"name":"Jamuna TV","logo":"https://iptv-org.github.io/images/languages/ben/JamunaTV.png","url":"https://tv.jamuna.tv/live/master.m3u8"},{"name":"Independent TV","logo":"https://iptv-org.github.io/images/languages/ben/IndependentTV.png","url":"https://independent-live.cdn.bongo.solutions/hls/independent.m3u8"},{"name":"Channel 24","logo":"https://iptv-org.github.io/images/languages/ben/Channel24.png","url":"https://c24-live.cdn.bongo.solutions/hls/channel24.m3u8"},{"name":"Star Jalsha","logo":"https://i.postimg.co/N0fL4g7X/Star-Jalsha.png","url":"https://linear-hls-prod.snplay.in/hls/starjalsha/index.m3u8"},{"name":"Zee Bangla","logo":"https://i.postimg.co/8chbyVq9/Zee-Bangla.png","url":"https://linear-hls-prod.snplay.in/hls/zeebangla/index.m3u8"},{"name":"Sony Aath","logo":"https://i.postimg.co/fW0N6M0w/Sony-Aath.png","url":"https://linear-hls-prod.snplay.in/hls/sonyaath/index.m3u8"},{"name":"Star Plus","logo":"https://i.postimg.co/0yXvYVzG/Star-Plus.png","url":"https://linear-hls-prod.snplay.in/hls/starplus/index.m3u8"},{"name":"Sony MAX","logo":"https://i.postimg.co/bYgqf8zN/Sony-Max.png","url":"https://linear-hls-prod.snplay.in/hls/sonymax/index.m3u8"}];
        const player = document.getElementById('video-player');
        let hls = new Hls({ max投BufferLength: 30, enableWorker: true });

        function playStream(url, btnElement) {
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    player.play().catch(e => console.log("Autoplay blocked, waiting for user interaction"));
                });
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = url;
                player.addEventListener('loadedmetadata', () => player.play());
            }
        }

        function initGrid(data) {
            const grid = document.getElementById('buttons-grid');
            grid.innerHTML = '';
            data.forEach((ch, index) => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                
                const img = document.createElement('img');
                img.src = ch.logo;
                img.onerror = function() { this.src = "https://placehold.co/120x70?text=" + encodeURIComponent(ch.name); };
                
                const span = document.createElement('span');
                span.innerText = ch.name;
                
                btn.appendChild(img);
                btn.appendChild(span);
                btn.onclick = function() { playStream(ch.url, btn); };
                grid.appendChild(btn);
                
                if(index === 0) { playStream(ch.url, btn); }
            });
        }

        initGrid(channels);
    </script>
</body>
</html>
