        .server-btn:hover { background: #45f3ff; color: #000; }
        .server-btn.active { background: #ff0000; color: #fff; border-color: #ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.5); }

        .channel-btn { background: #ffffff; color: #000; border: 2px solid #e1e4e8; padding: 15px 10px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; height: 120px; outline: none; }
        .channel-btn img { width: auto; height: 50px; max-width: 90%; object-fit: contain; }
        .channel-btn span { font-size: 13px; font-weight: bold; text-align: center; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; width: 100%; color: #111; }
        .channel-btn:hover { transform: translateY(-3px); border-color: #00ffcc; }
        .channel-btn.active { border-color: #00ffcc; box-shadow: 0 0 15px #00ffcc; background: #f0ffff; }
        @media(max-width: 600px){ .grid-container { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; } .channel-btn { height: 100px; } .channel-btn img { height: 40px; } }

        const player = document.getElementById('video-player');
        const hls = new Hls();

        function playStream(url, btnElement) {
            if (btnElement) {
                document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                btnElement.classList.add('active');
            }
            if (Hls.isSupported()) {
                hls.loadSource(url);
                hls.attachMedia(player);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = url;
                player.addEventListener('loadedmetadata', () => player.play());
            }
        }

        function selectChannel(ch, channelBtn) {
            document.querySelectorAll('.channel-btn').forEach(btn => btn.classList.remove('active'));
            if(channelBtn) channelBtn.classList.add('active');

            const serverPanel = document.getElementById('server-panel');
            const serverTitle = document.getElementById('server-title');
            const serverButtons = document.getElementById('server-buttons');

            serverTitle.innerText = "⚡ " + ch.name + " - SELECT SERVER:";
            serverButtons.innerHTML = '';
            serverPanel.style.display = "block";

            ch.servers.forEach((url, index) => {
                const sBtn = document.createElement('button');
                sBtn.className = 'server-btn';
                sBtn.innerText = 'Server ' + (index + 1);
                sBtn.onclick = function() { playStream(url, sBtn); };
                serverButtons.appendChild(sBtn);

                if (index === 0) { playStream(url, sBtn); }
            });
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function initGrid(data) {
            const grid = document.getElementById('buttons-grid');
            grid.innerHTML = '';
            data.forEach((ch, index) => {
                const btn = document.createElement('button');
                btn.className = 'channel-btn';
                
                const img = document.createElement('img');
                img.src = ch.logo;
                img.onerror = function() { this.src = "https://placehold.co/120x70/1f2833/00ffcc?text=" + encodeURIComponent(ch.name); };
                
                const span = document.createElement('span');
                span.innerText = ch.name;
                
                btn.appendChild(img);
                btn.appendChild(span);
                btn.onclick = function() { selectChannel(ch, btn); };
                grid.appendChild(btn);
                
                if(index === 0 && data.length === channels.length) {
                    selectChannel(ch, btn);
                }
            });
        }

        function filterChannels() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = channels.filter(ch => ch.name.toLowerCase().includes(query));
            initGrid(filtered);
        }

        initGrid(channels);
    </script>
